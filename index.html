<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pioneer Identity Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Landscape Print Optimization */
        @media print {
            @page {
                size: landscape;
                margin: 0; /* Minimal margin to maximize card size */
            }
            .no-print { display: none !important; }
            body { 
                background: white !important; 
                padding: 0 !important; 
                margin: 0 !important;
            }
            .page-container {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: 2mm;
                width: 100vw;
                height: 100vh;
                page-break-after: always;
                padding: 5mm;
                box-sizing: border-box;
            }
            .card { 
                width: 100% !important;
                height: 100% !important;
                margin: 0 !important;
                border: 1px solid #000 !important;
                box-shadow: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* Screen Styles */
        .card {
            width: 3.2in;
            height: 4.5in;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #fff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #e5e7eb;
            transition: transform 0.2s;
        }
        
        .crayon-texture {
            background-color: #fdfbf7;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
        }

        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 no-print text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Pioneer Identity Cards (1920s)</h1>
            <p class="text-gray-600 mb-4">Set your printer to <b>Landscape Mode</b>. Cards are formatted 6 per page (3x2 grid).</p>
            <div class="flex justify-center gap-4">
                <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-all shadow-lg">
                    <span id="btnText">Generate All 18 Portraits</span>
                </button>
                <button id="printBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition-all shadow-lg">
                    Print Cards (Landscape)
                </button>
            </div>
            <div id="progressStatus" class="mt-4 text-sm font-medium text-blue-600 hidden">
                Processing: <span id="completedCount">0</span> / 18
            </div>
        </header>

        <!-- Container for cards, logic will group them into pages -->
        <div id="mainContainer" class="flex flex-wrap justify-center gap-6">
            <!-- Pages and Cards injected here -->
        </div>
    </div>

    <script>
        const apiKey = "";
        const pioneers = [
            { name: "Abram", origin: "Russia", role: "Field Guard", desc: "A late teen male with a round face, heavily tanned sun-bronzed skin, wearing a wide-brimmed khaki hat, 1920s style, crayon drawing illustration style." },
            { name: "Sarah", origin: "Poland", role: "Doctor", desc: "A young woman in her early 20s, light skin, round glasses, hair in a bun, wearing a simple white collared shirt, 1920s style, crayon drawing illustration style." },
            { name: "Miriam", origin: "Odessa", role: "Cunner/Nurse", desc: "A smiling young woman, late teens, tanned skin, wearing a blue headscarf and a work apron, 1920s style, crayon drawing illustration style." },
            { name: "Yosef", origin: "Lithuania", role: "Blacksmith", desc: "A young man in his early 20s, strong jaw, soot-smudged tan skin, wearing a dark cap and a grey shirt, 1920s style, crayon drawing illustration style." },
            { name: "Rivka", origin: "Germany", role: "Teacher", desc: "A young woman, late teens, light skin, holding a book, wearing a simple green dress and a small sunhat, 1920s style, crayon drawing illustration style." },
            { name: "Moishe", origin: "Ukraine", role: "Cowherd", desc: "A freckled face young man, late teens, sun-reddened tan skin, wearing a straw hat and holding a wooden staff, 1920s style, crayon drawing illustration style." },
            { name: "Hannah", origin: "Yemen", role: "Gardener", desc: "A young woman with deep brown skin, dark braided hair, wearing a colorful embroidered tunic, 1920s style, crayon drawing illustration style." },
            { name: "Lev", origin: "Russia", role: "Builder", desc: "A young man in his early 20s, dusty olive skin, wearing a white sleeveless undershirt and suspenders, 1920s style, crayon drawing illustration style." },
            { name: "Dina", origin: "Poland", role: "Cook", desc: "A young woman with round cheeks, light skin, wearing a white chef-style kerchief on her head, 1920s style, crayon drawing illustration style." },
            { name: "Ari", origin: "Morocco", role: "Well-Digger", desc: "A determined young man with rich olive/brown skin, wearing a desert-style head wrap (Keffiyeh-style), 1920s style, crayon drawing illustration style." },
            { name: "Esther", origin: "Romania", role: "Beekeeper", desc: "A focused young woman, tanned skin, wearing a net-hat (mesh veil) pushed up, 1920s style, crayon drawing illustration style." },
            { name: "Zev", origin: "Latvia", role: "Carpenter", desc: "A young man, late teens, light skin with sawdust, pencil behind ear, wearing a brown vest and a flat cap, 1920s style, crayon drawing illustration style." },
            { name: "Tamar", origin: "Jerusalem", role: "Botanist", desc: "A young woman, tanned skin, holding a magnifying glass, wearing a khaki safari-style jacket, 1920s style, crayon drawing illustration style." },
            { name: "Shimon", origin: "Russia", role: "Tractor Driver", desc: "A young man, early 20s, deeply tanned skin from sun exposure, goggles on forehead, wearing a blue work shirt, 1920s style, crayon drawing illustration style." },
            { name: "Leah", origin: "Hungary", role: "Seamstress", desc: "A young woman, light skin, tape measure around neck, hair tied back with a simple ribbon, 1920s style, crayon drawing illustration style." },
            { name: "Noam", origin: "Iraq", role: "Flour Miller", desc: "A young man, early 20s, warm brown skin, hair dusty with white flour, wearing a simple linen tunic, 1920s style, crayon drawing illustration style." },
            { name: "Gideon", origin: "Czech Republic", role: "Musician", desc: "A late teen male, light skin, holding an accordion, wearing a flat cap and a vest, 1920s style, crayon drawing illustration style." },
            { name: "Batya", origin: "Poland", role: "Laundress", desc: "A young woman, late teens, rolled up sleeves, flushed tan skin, wearing a simple grey dress and headscarf, 1920s style, crayon drawing illustration style." }
        ];

        async function generateImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = {
                instances: [{ prompt: `Hand-drawn crayon portrait of ${prompt}. Vibrant wax colors, textured paper background, solo character, 1920s vintage style, high detail.` }],
                parameters: { sampleCount: 1 }
            };

            let retries = 5;
            let backoff = 1000;
            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (data.predictions?.[0]?.bytesBase64Encoded) {
                        return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    }
                } catch (e) {
                    retries--;
                    if (retries === 0) return null;
                    await new Promise(res => setTimeout(res, backoff));
                    backoff *= 2;
                }
            }
            return null;
        }

        function createCardElement(pioneer) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="h-1/2 bg-gray-50 crayon-texture flex items-center justify-center relative overflow-hidden border-b border-gray-200">
                    <img id="img-${pioneer.name}" class="w-full h-full object-cover hidden" src="" alt="${pioneer.name}">
                    <div id="loader-${pioneer.name}" class="flex flex-col items-center gap-2 text-gray-400 italic text-[10px] text-center px-4">
                        <div id="spinner-${pioneer.name}" class="spinner"></div>
                        <span id="text-${pioneer.name}">Awaiting Start</span>
                    </div>
                </div>
                <div class="p-4 flex-grow flex flex-col justify-between bg-white">
                    <div>
                        <h2 class="text-xl font-black text-gray-900 uppercase leading-none mb-1">${pioneer.name}</h2>
                        <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-2">From ${pioneer.origin}</p>
                    </div>
                    <div class="border-t border-gray-100 pt-2">
                        <span class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Assigned Role</span>
                        <p class="text-lg font-serif italic text-gray-800 leading-tight">${pioneer.role}</p>
                    </div>
                </div>
                <div class="bg-gray-900 text-white text-[8px] py-1 text-center font-bold tracking-[0.2em] uppercase">
                    Pioneer Identity • 1920s
                </div>
            `;
            return card;
        }

        function setupGrid() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = '';
            
            // Create 3 pages, each with 6 cards
            for (let p = 0; p < 3; p++) {
                const page = document.createElement('div');
                page.className = 'page-container flex flex-wrap gap-4 justify-center';
                
                for (let c = 0; c < 6; c++) {
                    const index = (p * 6) + c;
                    if (index < pioneers.length) {
                        page.appendChild(createCardElement(pioneers[index]));
                    }
                }
                container.appendChild(page);
            }
        }

        setupGrid();

        let completed = 0;
        async function processPioneer(pioneer) {
            const loaderText = document.getElementById(`text-${pioneer.name}`);
            const spinner = document.getElementById(`spinner-${pioneer.name}`);
            const img = document.getElementById(`img-${pioneer.name}`);
            const loaderDiv = document.getElementById(`loader-${pioneer.name}`);
            
            loaderText.innerText = "Drawing...";
            
            const src = await generateImage(pioneer.desc);
            if (src) {
                img.src = src;
                img.classList.remove('hidden');
                loaderDiv.classList.add('hidden');
            } else {
                spinner.classList.add('hidden');
                loaderText.innerText = "Error";
            }
            
            completed++;
            document.getElementById('completedCount').innerText = completed;
            if (completed === 18) {
                document.getElementById('btnText').innerText = "Regenerate All";
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('generateBtn').classList.remove('opacity-50');
            }
        }

        // Updated print logic to ensure focus is on the current document
        document.getElementById('printBtn').addEventListener('click', function() {
            try {
                // Focus the current window explicitly
                window.focus();
                // Brief timeout to ensure DOM focus is caught before print dialog interrupts
                setTimeout(() => {
                    window.print();
                }, 250);
            } catch (e) {
                console.error("Print failed", e);
                // Fallback for some browsers
                document.execCommand('print', false, null);
            }
        });

        document.getElementById('generateBtn').onclick = async () => {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.classList.add('opacity-50');
            document.getElementById('btnText').innerText = "Generating...";
            document.getElementById('progressStatus').classList.remove('hidden');
            completed = 0;

            const batchSize = 3;
            for (let i = 0; i < pioneers.length; i += batchSize) {
                const batch = pioneers.slice(i, i + batchSize);
                await Promise.all(batch.map(p => processPioneer(p)));
            }
        };
    </script>
</body>
</html>
